name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Secret scan (detect-secrets)
        run: |
          detect-secrets scan --baseline .secrets.baseline || true
          echo "⚠️ Review detect-secrets output above for any findings"

      - name: Lint — isort
        run: isort src/ tests/ --check-only --diff

      - name: Lint — black
        run: black src/ tests/ --check --line-length 100

      - name: Lint — flake8
        run: flake8 src/ tests/ --max-line-length 100 --extend-ignore E203

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
