# =============================================================================
# SentinelIQ — Nginx Reverse Proxy Configuration
# =============================================================================
# Proxies port 80 → ml_server:7860
# Enables gzip, proper proxy headers, and request timeouts.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 10m;   # allow up to 10 MB request bodies (batch predict)

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain
                      text/css
                      application/json
                      application/javascript
                      application/x-javascript
                      text/xml
                      application/xml;

    # ── Upstream: FastAPI ML Server ───────────────────────────────────────────
    upstream ml_server {
        server ml_server:7860;
        keepalive 32;
    }

    # ── Server block ──────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Content-Type-Options  nosniff    always;
        add_header X-Frame-Options         DENY       always;
        add_header X-XSS-Protection        "1; mode=block" always;
        add_header Referrer-Policy         "no-referrer-when-downgrade" always;

        # ── Health check passthrough (no rewrite, no auth) ────────────────────
        location = /health {
            proxy_pass         http://ml_server;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log         off;
        }

        # ── All other API traffic ─────────────────────────────────────────────
        location / {
            proxy_pass         http://ml_server;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";   # keep-alive to upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts (ML inference can take up to 30 s on CPU)
            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;
        }
    }
}
